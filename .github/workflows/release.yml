name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish macOS arm64 release
    runs-on: macos-14
    timeout-minutes: 30
    env:
      APP_BUNDLE_NAME: simple-ptt.app
      BINARY_NAME: simple-ptt
      CARGO_TERM_COLOR: always
      TARGET_TRIPLE: aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install stable Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "$TARGET_TRIPLE"

      - name: Validate tag matches Cargo.toml version
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          cargo_version="$(awk -F'"' '
            $0 == "[package]" { in_package = 1; next }
            /^\[/ && in_package { exit }
            in_package && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"

          expected_tag="v${cargo_version}"
          if [[ "$TAG" != "$expected_tag" ]]; then
            echo "release tag $TAG does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target "$TARGET_TRIPLE"

      - name: Package release archive
        id: package
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          asset_basename="${BINARY_NAME}-${TAG}-macos-arm64"
          app_bundle_path="${RUNNER_TEMP}/${APP_BUNDLE_NAME}"
          archive_path="${RUNNER_TEMP}/${asset_basename}.dmg"
          checksum_path="${RUNNER_TEMP}/${asset_basename}.sha256"

          ./scripts/build-macos-app.sh \
            "target/${TARGET_TRIPLE}/release/${BINARY_NAME}" \
            "$app_bundle_path"
          ./scripts/build-macos-dmg.sh "$app_bundle_path" "$archive_path"
          shasum -a 256 "$archive_path" > "$checksum_path"

          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$checksum_path" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          CHECKSUM_PATH: ${{ steps.package.outputs.checksum_path }}
        run: |
          set -euo pipefail

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ARCHIVE_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$TAG" "$ARCHIVE_PATH" "$CHECKSUM_PATH" \
              --title "$TAG" \
              --generate-notes
          fi
